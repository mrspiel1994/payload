services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://payload:${POSTGRES_PASSWORD}@postgres:5432/payload
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_DB_PUSH: ${PAYLOAD_DB_PUSH:-false}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
      CRON_SECRET: ${CRON_SECRET:-}
      PREVIEW_SECRET: ${PREVIEW_SECRET:-}
    ports:
      - "3000:3000"
    volumes:
      - payload_media:/app/public/media

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payload
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - payload_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d payload"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  payload_media:
  payload_postgres:
